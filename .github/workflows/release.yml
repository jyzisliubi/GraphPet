name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          pip install --no-cache-dir -r python/requirements.txt -t python/vendor
          Get-ChildItem -Path python/vendor -Recurse -Directory -Filter '__pycache__' | Remove-Item -Recurse -Force
        shell: pwsh

      - name: Build & Package
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ''

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GraphPet-Windows
          path: release/*.exe
          retention-days: 30

  release:
    name: Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: GraphPet-Windows
          path: release

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
